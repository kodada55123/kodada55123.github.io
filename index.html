          if (!normalizedCarSearch) return cars;
          return cars.filter((car) => {
            const driverMatch = car.driver.toLowerCase().includes(normalizedCarSearch);
            const locationMatch = car.location.toLowerCase().includes(normalizedCarSearch);
            const passengerMatch = car.passengers.some((p) => p.toLowerCase().includes(normalizedCarSearch));
            return driverMatch || locationMatch || passengerMatch;
          });
        }, [normalizedCarSearch]);

          const list = beds.filter((room) => room.building === "A棟");
          if (!normalizedBedSearch) return list;
          return list.filter(
            (room) =>
              room.room.toLowerCase().includes(normalizedBedSearch) ||
              room.people.some((person) => person.toLowerCase().includes(normalizedBedSearch)) ||
              room.floor.toLowerCase().includes(normalizedBedSearch)
          );
        }, [normalizedBedSearch]);

        const filteredBBeds = useMemo(() => {
          const list = beds.filter((room) => room.building === "B棟");
          if (!normalizedBedSearch) return list;
          return list.filter(
            (room) =>
              room.room.toLowerCase().includes(normalizedBedSearch) ||
              room.people.some((person) => person.toLowerCase().includes(normalizedBedSearch)) ||
              room.floor.toLowerCase().includes(normalizedBedSearch)
          );
        }, [normalizedBedSearch]);

                          target="_blank"
                          rel="noreferrer"

                          </ul>
                        </div>

                    )}

                          <div className="flex items-center gap-2 text-sm font-black text-slate-700">
                            <Icon name="search" className="h-4 w-4" />
                            搜尋汽車名單
                          </div>
                          <input
                            value={carSearch}
                            onChange={(e) => setCarSearch(e.target.value)}
                            placeholder="輸入人名、司機或上車地點"
                            className="mt-3 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:bg-white focus:shadow-soft"

                        {filteredCars.length === 0 ? (
                          <div className="rounded-[1.75rem] border border-dashed border-slate-200 bg-white p-5 text-center text-sm text-neutral-500 shadow-soft">
                            查無符合的人名或地點
                          </div>
                        ) : (
                          filteredCars.map((car) => (
                            <div key={car.id} className="rounded-[1.75rem] border border-slate-200/80 bg-white/90 p-4 shadow-soft transition hover:-translate-y-0.5 hover:shadow-float">
                              <div className="flex items-center justify-between gap-3">
                                <div className="rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-600">🚗 第{car.id}車</div>
                                <div className="rounded-full bg-slate-800 px-3 py-1 text-xs font-black text-white">司機</div>
                              </div>

                              <div className="mt-3 text-2xl font-black text-slate-900">{car.driver}</div>
                              <div className="mt-1 flex items-center gap-1 text-sm text-slate-500">
                                <Icon name="map-pin" className="h-4 w-4" />
                                {car.location}
                              </div>

                              <div className="mt-4 grid grid-cols-2 gap-2">
                                {car.passengers.map((p, i) => (
                                  <div key={`${car.id}-${p}-${i}`} className="rounded-xl bg-slate-50 px-3 py-2 text-center text-sm font-semibold text-slate-700 ring-1 ring-slate-200">
                                    {p}
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    )}

                    {tab === "bed" && (
                      <div className="space-y-6">
                        <div className="rounded-[1.75rem] border border-slate-200/80 bg-white/85 p-4 shadow-soft">
                          <div className="flex items-center gap-2 text-sm font-black text-slate-700">
                            <Icon name="search" className="h-4 w-4" />
                            搜尋床位名單
                          </div>
                          <input
                            value={bedSearch}
                            onChange={(e) => setBedSearch(e.target.value)}
                            placeholder="輸入人名、房型或樓層"
                            className="mt-3 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition focus:border-slate-400 focus:bg-white focus:shadow-soft"
                          />
                        </div>

                        {renderRoomSection("A棟房間", filteredABeds, "bg-slate-100 text-slate-700")}
                        {renderRoomSection("B棟房間", filteredBBeds, "bg-stone-100 text-stone-700")}
                      </div>
                    )}

                    {tab === "team" && (
                      <div className="space-y-4">
                        <div className="rounded-[1.9rem] border border-slate-200/80 bg-white/90 p-6 text-center shadow-soft">
                          <div className="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-[linear-gradient(135deg,_#0f172a_0%,_#334155_100%)] text-white shadow-xl">
                            <Icon name="party-popper" className="h-7 w-7" />
                          </div>
                          <div className="mt-4 text-2xl font-black text-neutral-900">遊戲分組</div>
                          <div className="mt-2 text-sm leading-7 text-neutral-700">
                            分組名單將在 <span className="font-black text-slate-800">活動當日</span> 公布！
                          </div>
                          <div className="mt-2 text-sm leading-7 text-neutral-700">保留一點神秘感與驚喜感 ✨</div>
                          <div className="mt-1 text-sm leading-7 text-neutral-700">大家一起期待一下吧，現場見 😆</div>
                        </div>

                        <div className="rounded-[1.5rem] border border-dashed border-slate-200 bg-white/90 p-4 text-center text-sm font-medium text-slate-500 shadow-soft">
                          當天現場公布分組，請留意主持人說明 📢
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<EventInfoPage />);
    </script>
  </body>
</html>
